services:
  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: unless-stopped
    network_mode: host
    volumes:
      - /etc/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /etc/traefik/dynamic:/etc/traefik/dynamic:ro
      - /etc/traefik/certs:/etc/traefik/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --configFile=/etc/traefik/traefik.yml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/dashboard/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  onboarding:
    image: python:3-alpine
    container_name: onboarding
    restart: unless-stopped
    network_mode: host
    working_dir: /usr/share/nginx/html
    command: python -m http.server 8082
    volumes:
      - /etc/traefik/onboarding:/usr/share/nginx/html:ro

  onboarding-backend:
    build: /etc/traefik/onboarding-backend
    container_name: onboarding-backend
    restart: unless-stopped
    network_mode: host
    env_file: /etc/traefik/onboarding-backend/.env
