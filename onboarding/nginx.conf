server {
    listen 8082;
    listen [::]:8082;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache the mobileconfig
    location ~* \.mobileconfig$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Main page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # CA cert download
    location = /assets/paceyspace-ca.crt {
        add_header Content-Type "application/x-x509-ca-cert";
        add_header Content-Disposition "attachment; filename=paceyspace-ca.crt";
    }

    # Mobileconfig download
    location = /assets/paceyspace-ca.mobileconfig {
        add_header Content-Type "application/x-apple-aspen-config";
        add_header Content-Disposition "attachment; filename=paceyspace-workspace.mobileconfig";
    }
}
